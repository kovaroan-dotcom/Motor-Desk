name: Update Motor Desk

on:
  schedule:
    - cron: "0 6 * * *"   # every day at 06:00 UTC
  workflow_dispatch:        # manual trigger from Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run generator
        run: python generate.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Commit updated files
        run: |
          git config user.name  "Motor Desk Bot"
          git config user.email "bot@motor-desk"
          git add motor-desk.html articles.json
          git diff --cached --quiet || git commit -m "Motor Desk: $(date +'%d %B %Y') update"
          git push
